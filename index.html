<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D&D AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Meta для установки на домашний экран -->
    <meta name="application-name" content="D&D AI" />
    <meta name="msapplication-TileColor" content="#10b981" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Иконки -->
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    
    <!-- Предзагрузка критичных ресурсов -->
    <link rel="preconnect" href="https://ufqcaiszecocwtqseegz.supabase.co" />
    
    <title>D&D Dark Fantasy AI</title>
    
    <script>
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && (args[0].includes('websocket') || args[0].includes('WebSocket'))) return;
          originalError.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
          if (event.reason && (event.reason.message || '').includes('WebSocket')) event.preventDefault();
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            console.log('SW зарегистрирован:', registration.scope);
          }).catch((error) => {
            console.log('SW ошибка:', error);
          });
        });
      }
    </script>
  </body>
</html>
